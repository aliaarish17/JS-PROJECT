<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <!-- <h2>New Call</h2> -->
        <form id="forms">
            <h2>New Call</h2>
            <label>Image Url</label>
            <input type="text" placeholder=""/>

            <label>Full Name</label>
            <input type="text" placeholder="Enter Full name"/>
            
            <label>Home Town</label>
            <input type="text" placeholder="Enter home town"/>
            
            <label>Purpose</label>
            <input type="text" placeholder="e.g. Quick appointment note"/>

            <label>Category</label>
            <li><input class="tick" type="checkbox"><label>item1</label></li>
            <li><input class="tick" type="checkbox"><label>item1</label></li>
            <li><input class="tick" type="checkbox"><label>item1</label></li>
            <li><input class="tick" type="checkbox"><label>item1</label></li>
            <div class="btn">
            <button><span>Call</span></button>
            <button id="closeForm"><span>Submit</span></button>
            </div>
        </form>
    </div>
    <div class="scene">
        <!-- left icons -->
        <div class="left-icons">
              <button class="left-btn"><i id="add-note" class="fa-solid fa-plus"></i></button>
              <button class="left-btn"><i id="" class="fa-solid fa-arrow-up"></i></button>
              <button class="left-btn"><i class="fa-solid fa-arrow-down"></i></button>
            </div>
        <!-- card: -->
         <div class="card-wrapper">
            <div class="card">
                 <div class="avatar">A</div>
                 <div class="name">Aarish</div>
                 <div class="info">
                     <span class="info-label">Home town</span>
                     <span class="info-value">Jamshedpur</span>
                 </div>
                 <div class="info">
                     <span class="info-label">Booking</span>
                     <span class="info-value">3 times</span>
                 </div>
                 <div class="actions">
                     <button class="btn-call"><i class="fa-solid fa-phone"></i> Call</button>
                     <button class="btn-msg">Message</button>   
                 </div>
             </div>
         </div>
        <div class="swatches">
            <div class="swatch swatch-black"></div>
            <div class="swatch swatch-purple"></div>
            <div class="swatch swatch-orange"></div>
            <div class="swatch swatch-green"></div>
        </div>

        </div>
    
</body>
</html>
